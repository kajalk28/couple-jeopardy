<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couples Trivia Jeopardy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(170deg, #0a0a2e 0%, #16163a 40%, #1a1040 100%);
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    padding: 20px 16px 40px;
    overflow-x: hidden;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes cellPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(0); opacity: 0; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  .header { text-align: center; margin-bottom: 16px; }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA34E, #FFD700);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: clamp(11px, 1.8vw, 16px);
    font-weight: 700;
    letter-spacing: 6px;
    color: rgba(255,215,0,0.7);
    margin-top: 2px;
  }

  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .score-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 14px 28px;
    text-align: center;
    min-width: 160px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    border: 3px solid transparent;
  }
  .score-card.active-1 {
    border-color: #FF4E6A;
    box-shadow: 0 0 25px rgba(255, 78, 106, 0.4);
    animation: float 2s ease-in-out infinite;
  }
  .score-card.active-2 {
    border-color: #4E9AFF;
    box-shadow: 0 0 25px rgba(78, 154, 255, 0.4);
    animation: float 2s ease-in-out infinite;
  }
  .team-indicator {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 16px 16px 0 0;
  }
  .team-indicator.t1 { background: #FF4E6A; }
  .team-indicator.t2 { background: #4E9AFF; }
  .team-name {
    font-size: 14px;
    font-weight: 600;
    opacity: 0.8;
    margin-top: 4px;
    cursor: pointer;
  }
  .name-input {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 4px 8px;
    text-align: center;
    outline: none;
    width: 120px;
    font-family: 'DM Sans', sans-serif;
    margin-top: 4px;
  }
  .score-num {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 900;
    font-family: 'Playfair Display', serif;
    margin-top: 2px;
  }
  .score-num.t1 { color: #FF4E6A; }
  .score-num.t2 { color: #4E9AFF; }

  .turn-banner {
    text-align: center;
    padding: 8px 24px;
    border-radius: 30px;
    display: block;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    margin: 0 auto 16px;
    width: fit-content;
  }
  .turn-banner.t1 { background: #FF4E6A; }
  .turn-banner.t2 { background: #4E9AFF; }

  .board-container {
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(7, minmax(130px, 1fr));
    gap: 8px;
    min-width: 900px;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .category-header {
    background: linear-gradient(180deg, rgba(255,215,0,0.15) 0%, rgba(255,215,0,0.05) 100%);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .category-text {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(11px, 1.3vw, 15px);
    color: #FFD700;
    line-height: 1.3;
  }
  .cell {
    background: linear-gradient(180deg, rgba(78,154,255,0.12) 0%, rgba(78,154,255,0.04) 100%);
    border: 1px solid rgba(78,154,255,0.2);
    border-radius: 12px;
    padding: 16px 8px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60px;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .cell:hover:not(.answered) {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
  }
  .cell.answered {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    cursor: default;
  }
  .cell.popping { animation: cellPop 0.3s ease-in forwards; }
  .cell-value {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(18px, 2.5vw, 28px);
    color: #FFD700;
    text-shadow: 0 0 12px rgba(255,215,0,0.3);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .overlay.hidden { display: none; }

  .question-card, .answer-card, .complete-card {
    border-radius: 24px;
    padding: 40px 36px;
    max-width: 600px;
    width: 100%;
    text-align: center;
    animation: slideIn 0.4s ease;
  }
  .question-card {
    background: linear-gradient(170deg, #16163a, #1a1040);
    border: 1px solid rgba(255,215,0,0.2);
    box-shadow: 0 0 60px rgba(255,215,0,0.1);
  }
  .answer-card {
    background: linear-gradient(170deg, #16163a, #1a1040);
    border: 1px solid rgba(80,227,194,0.3);
    box-shadow: 0 0 60px rgba(80,227,194,0.1);
    padding: 36px 32px;
  }
  .complete-card {
    background: linear-gradient(170deg, #16163a, #1a1040);
    border: 1px solid rgba(255,215,0,0.3);
    box-shadow: 0 0 80px rgba(255,215,0,0.15);
    border-radius: 28px;
    padding: 48px 40px;
    max-width: 500px;
  }

  .q-category {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,215,0,0.7);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .q-value {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: #FFD700;
    margin-bottom: 24px;
  }
  .q-text {
    font-size: clamp(18px, 2.5vw, 24px);
    font-weight: 500;
    line-height: 1.5;
    color: rgba(255,255,255,0.92);
    margin-bottom: 32px;
  }
  .reveal-btn {
    background: linear-gradient(135deg, #FFD700, #FFA34E);
    color: #1a1040;
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: transform 0.2s;
    letter-spacing: 0.5px;
  }
  .reveal-btn:hover { transform: scale(1.05); }

  .answer-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #50E3C2;
    margin-top: 16px;
    margin-bottom: 8px;
  }
  .answer-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
    color: #50E3C2;
    line-height: 1.4;
    margin-bottom: 28px;
  }
  .who-got-it {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .score-btns {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .team-btn {
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: transform 0.2s;
    min-width: 140px;
  }
  .team-btn:hover { transform: scale(1.08); }
  .team-btn.t1 { background: #FF4E6A; }
  .team-btn.t2 { background: #4E9AFF; }

  .no-one-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 28px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .no-one-btn:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); }

  .complete-emoji { font-size: 64px; margin-bottom: 12px; }
  .complete-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: #FFD700;
    margin-bottom: 24px;
  }
  .final-scores {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .final-score-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 20px;
  }
  .final-team-name { font-weight: 700; font-size: 20px; }
  .final-team-name.t1 { color: #FF4E6A; }
  .final-team-name.t2 { color: #4E9AFF; }
  .final-score-num {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 28px;
    color: #FFD700;
  }
  .winner-text {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 24px;
    color: #fff;
  }
  .play-again-btn {
    background: linear-gradient(135deg, #FFD700, #FFA34E);
    color: #1a1040;
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .play-again-btn:hover { transform: scale(1.05); }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }
  .confetti-piece {
    position: absolute;
    top: -10px;
  }
</style>
</head>
<body>

<div class="header">
  <h1 class="title">Couples Trivia</h1>
  <div class="subtitle">JEOPARDY EDITION</div>
</div>

<div class="scoreboard" id="scoreboard"></div>
<div id="turn-banner"></div>
<div class="board-container" id="board-container"></div>

<!-- Overlays -->
<div class="overlay hidden" id="question-overlay">
  <div class="question-card">
    <div class="q-category" id="q-category"></div>
    <div class="q-value" id="q-value"></div>
    <div class="q-text" id="q-text"></div>
    <button class="reveal-btn" id="reveal-btn">Reveal Answer</button>
  </div>
</div>

<div class="overlay hidden" id="answer-overlay">
  <div class="answer-card">
    <div class="q-category" id="a-category"></div>
    <div class="answer-label">ANSWER</div>
    <div class="answer-text" id="a-text"></div>
    <div class="who-got-it">Who got it right?</div>
    <div class="score-btns" id="score-btns"></div>
    <button class="no-one-btn" id="no-one-btn">No one got it</button>
  </div>
</div>

<div class="overlay hidden" id="complete-overlay">
  <div class="complete-card">
    <div class="complete-emoji">🏆</div>
    <div class="complete-title">Game Over!</div>
    <div class="final-scores" id="final-scores"></div>
    <div class="winner-text" id="winner-text"></div>
    <button class="play-again-btn" id="play-again-btn">Play Again</button>
  </div>
</div>

<div class="confetti-container hidden" id="confetti"></div>

<script>
const CATEGORIES = [
  {
    name: "Ancient History",
    questions: [
      { value: 200, question: "What ancient wonder was located in the city of Alexandria, Egypt?", answer: "The Lighthouse (Pharos) of Alexandria" },
      { value: 400, question: "What Roman structure, completed in 80 AD, could hold over 50,000 spectators?", answer: "The Colosseum" },
      { value: 600, question: "Which Chinese dynasty built the majority of the Great Wall as we know it today?", answer: "The Ming Dynasty" },
      { value: 800, question: "What was the name of the volcanic eruption that buried the Roman city of Pompeii in 79 AD?", answer: "Mount Vesuvius" },
      { value: 1000, question: "In ancient Japan, what was the warrior code of honor followed by samurai called?", answer: "Bushido" },
    ],
  },
  {
    name: "Greek Mythology",
    questions: [
      { value: 200, question: "What river in the Underworld must the dead cross, and who is the ferryman that takes them?", answer: "The River Styx \u2014 the ferryman is Charon" },
      { value: 400, question: "Odysseus had to navigate between two monsters on either side of a narrow strait. Name both of them.", answer: "Scylla and Charybdis" },
      { value: 600, question: "Who was cursed by Apollo to always speak true prophecies but never be believed?", answer: "Cassandra" },
      { value: 800, question: "What punishment did Tantalus receive in the Underworld, and what did he do to deserve it?", answer: "He stands in water that recedes when he reaches for it, under fruit that pulls away \u2014 he killed his son Pelops and served him to the gods at a feast" },
      { value: 1000, question: "Name all three Fates (the Moirai) and what each one does with the thread of life.", answer: "Clotho (spins the thread), Lachesis (measures/allots the thread), and Atropos (cuts the thread)" },
    ],
  },
  {
    name: "Recent Movies",
    questions: [
      { value: 200, question: "In the 2024 Pixar hit 'Inside Out 2,' what new emotion shows up when Riley hits puberty and takes over headquarters?", answer: "Anxiety" },
      { value: 400, question: "In 'Dune: Part Two' (2024), what giant creatures do the Fremen ride across the desert of Arrakis?", answer: "Sandworms (Shai-Hulud)" },
      { value: 600, question: "In 'Deadpool & Wolverine' (2024), what Marvel location do Deadpool and Wolverine get banished to \u2014 a wasteland where pruned timelines end up?", answer: "The Void" },
      { value: 800, question: "In the 2024 movie 'Wicked,' who plays Elphaba and who plays Glinda?", answer: "Cynthia Erivo plays Elphaba, Ariana Grande plays Glinda" },
      { value: 1000, question: "In 'Oppenheimer' (2023), what was the code name of the first nuclear weapon test depicted in the film's climax?", answer: "Trinity" },
    ],
  },
  {
    name: "Cars & Vehicles",
    questions: [
      { value: 200, question: "What Italian brand is known for its prancing horse logo?", answer: "Ferrari" },
      { value: 400, question: "What Ford GT model won the 24 Hours of Le Mans in 1966, beating Ferrari for the first major American victory?", answer: "The Ford GT40" },
      { value: 600, question: "What Japanese manufacturer makes the Supra, Camry, and Land Cruiser?", answer: "Toyota" },
      { value: 800, question: "What does 'AMG' stand for in Mercedes-AMG?", answer: "Aufrecht Melcher Gro\u00dfaspach (the founders' names and birthplace)" },
      { value: 1000, question: "What car brand's name translates to 'I roll' in Latin?", answer: "Volvo" },
    ],
  },
  {
    name: "Game of Thrones",
    questions: [
      { value: 200, question: "What are the words (motto) of House Stark?", answer: "Winter Is Coming" },
      { value: 400, question: "What is the name of Jon Snow's direwolf?", answer: "Ghost" },
      { value: 600, question: "What event, involving a massacre at a wedding, is known as the Red Wedding?", answer: "The murder of Robb Stark, his mother Catelyn, and his army at the Twins by the Freys and Boltons" },
      { value: 800, question: "What is the name of the massive wall of ice in the North, and roughly how tall is it?", answer: "The Wall \u2014 approximately 700 feet tall" },
      { value: 1000, question: "What are the names of Daenerys Targaryen's three dragons?", answer: "Drogon, Rhaegal, and Viserion" },
    ],
  },
  {
    name: "GoT: Hard Mode \uD83D\uDD25",
    questions: [
      { value: 200, question: "What Valyrian steel sword belongs to House Stark and who reforged it into two blades?", answer: "Ice \u2014 reforged by Tywin Lannister into Oathkeeper and Widow's Wail" },
      { value: 400, question: "What is the real name of Hodor, and what does 'Hodor' actually mean?", answer: "Wylis \u2014 'Hodor' is a corruption of 'Hold the door'" },
      { value: 600, question: "Name every member of Arya Stark's original kill list (the names she recited at night).", answer: "Joffrey, Cersei, Walder Frey, Meryn Trant, Tywin Lannister, The Red Woman (Melisandre), Beric Dondarrion, Thoros of Myr, Ilyn Payne, The Mountain, The Hound" },
      { value: 800, question: "What is the Night King's origin \u2014 who created him and how?", answer: "The Children of the Forest created him by plunging a dragonglass dagger into the chest of a First Man" },
      { value: 1000, question: "What is Daenerys's full title as she introduces herself throughout the series?", answer: "Daenerys Stormborn of House Targaryen, the First of Her Name, Queen of the Andals and the First Men, Protector of the Seven Kingdoms, the Mother of Dragons, the Khaleesi of the Great Grass Sea, the Unburnt, the Breaker of Chains" },
    ],
  },
  {
    name: "2000s Pop & Culture",
    questions: [
      { value: 200, question: "What One Direction member left the group first in 2015?", answer: "Zayn Malik" },
      { value: 400, question: "What 2006 Beyonc\u00e9 hit tells a partner to 'put a ring on it'... wait, what year was Single Ladies actually released?", answer: "2008 (If You Liked It Then You Should Have Put a Ring on It)" },
      { value: 600, question: "On what British TV show were the five members of One Direction originally solo contestants before being grouped together?", answer: "The X Factor" },
      { value: 800, question: "What was the name of Britney Spears' controversial 2007 head-shaving incident's location \u2014 what salon in Tarzana, CA?", answer: "Esther's Hair Salon (or Esther's Haircutting Studio)" },
      { value: 1000, question: "Name all five members of One Direction AND the single that was their first UK number one hit.", answer: "Harry Styles, Niall Horan, Liam Payne, Louis Tomlinson, Zayn Malik \u2014 'What Makes You Beautiful'" },
    ],
  },
];

// Game state
let gameState = "board";
let selectedQ = null;
let answeredQuestions = new Set();
let scores = { 1: 0, 2: 0 };
let currentTeam = 1;
let teamNames = { 1: "Team 1", 2: "Team 2" };
let editingName = null;
const totalQuestions = CATEGORIES.reduce((sum, cat) => sum + cat.questions.length, 0);

function render() {
  renderScoreboard();
  renderTurnBanner();
  renderBoard();
  renderOverlays();
}

function renderScoreboard() {
  const sb = document.getElementById("scoreboard");
  sb.innerHTML = [1, 2].map(team => {
    const isActive = currentTeam === team && gameState === "board";
    const activeClass = isActive ? ` active-${team}` : "";
    const nameHTML = editingName === team
      ? `<input class="name-input" id="name-input-${team}" value="${teamNames[team]}" maxlength="16" autofocus>`
      : `<div class="team-name" data-edit-team="${team}">${teamNames[team]} \u270F\uFE0F</div>`;
    return `
      <div class="score-card${activeClass}">
        <div class="team-indicator t${team}"></div>
        ${nameHTML}
        <div class="score-num t${team}">$${scores[team].toLocaleString()}</div>
      </div>
    `;
  }).join("");

  // Bind name edit clicks
  sb.querySelectorAll("[data-edit-team]").forEach(el => {
    el.addEventListener("click", () => {
      editingName = parseInt(el.dataset.editTeam);
      render();
      const input = document.getElementById(`name-input-${editingName}`);
      if (input) {
        input.focus();
        input.select();
      }
    });
  });

  // Bind name inputs
  sb.querySelectorAll(".name-input").forEach(input => {
    const team = parseInt(input.id.split("-").pop());
    const save = () => {
      if (input.value.trim()) teamNames[team] = input.value.trim();
      editingName = null;
      render();
    };
    input.addEventListener("blur", save);
    input.addEventListener("keydown", e => { if (e.key === "Enter") save(); });
  });
}

function renderTurnBanner() {
  const el = document.getElementById("turn-banner");
  if (gameState === "board") {
    el.innerHTML = `<div class="turn-banner t${currentTeam}">${teamNames[currentTeam]}'s Pick</div>`;
  } else {
    el.innerHTML = "";
  }
}

function renderBoard() {
  const container = document.getElementById("board-container");
  if (gameState !== "board") { container.innerHTML = ""; return; }

  container.innerHTML = `<div class="board">${CATEGORIES.map((cat, catIdx) => `
    <div class="column">
      <div class="category-header"><span class="category-text">${cat.name}</span></div>
      ${cat.questions.map((q, qIdx) => {
        const key = `${catIdx}-${qIdx}`;
        const answered = answeredQuestions.has(key);
        return `<div class="cell${answered ? " answered" : ""}" data-cat="${catIdx}" data-q="${qIdx}">
          ${answered ? "" : `<span class="cell-value">$${q.value}</span>`}
        </div>`;
      }).join("")}
    </div>
  `).join("")}</div>`;

  container.querySelectorAll(".cell:not(.answered)").forEach(cell => {
    cell.addEventListener("click", () => {
      const catIdx = parseInt(cell.dataset.cat);
      const qIdx = parseInt(cell.dataset.q);
      cell.classList.add("popping");
      setTimeout(() => {
        selectedQ = { catIdx, qIdx };
        gameState = "question";
        render();
      }, 300);
    });
  });
}

function renderOverlays() {
  const qOverlay = document.getElementById("question-overlay");
  const aOverlay = document.getElementById("answer-overlay");
  const cOverlay = document.getElementById("complete-overlay");
  const confetti = document.getElementById("confetti");

  qOverlay.classList.toggle("hidden", gameState !== "question");
  aOverlay.classList.toggle("hidden", gameState !== "answer");
  cOverlay.classList.toggle("hidden", gameState !== "complete");
  confetti.classList.toggle("hidden", gameState !== "complete");

  if (gameState === "question" && selectedQ) {
    const cat = CATEGORIES[selectedQ.catIdx];
    const q = cat.questions[selectedQ.qIdx];
    document.getElementById("q-category").textContent = cat.name;
    document.getElementById("q-value").textContent = `$${q.value}`;
    document.getElementById("q-text").textContent = q.question;
  }

  if (gameState === "answer" && selectedQ) {
    const cat = CATEGORIES[selectedQ.catIdx];
    const q = cat.questions[selectedQ.qIdx];
    document.getElementById("a-category").textContent = `${cat.name} — $${q.value}`;
    document.getElementById("a-text").textContent = q.answer;

    const btns = document.getElementById("score-btns");
    btns.innerHTML = [1, 2].map(team =>
      `<button class="team-btn t${team}" data-score-team="${team}">${teamNames[team]}</button>`
    ).join("");
    btns.querySelectorAll("[data-score-team]").forEach(btn => {
      btn.addEventListener("click", () => handleScore(parseInt(btn.dataset.scoreTeam)));
    });
  }

  if (gameState === "complete") {
    const fs = document.getElementById("final-scores");
    fs.innerHTML = [1, 2].map(team => `
      <div class="final-score-item">
        <span class="final-team-name t${team}">${teamNames[team]}</span>
        <span class="final-score-num">$${scores[team].toLocaleString()}</span>
      </div>
    `).join("");

    const wt = document.getElementById("winner-text");
    if (scores[1] > scores[2]) wt.textContent = `\uD83C\uDF89 ${teamNames[1]} Wins! \uD83C\uDF89`;
    else if (scores[2] > scores[1]) wt.textContent = `\uD83C\uDF89 ${teamNames[2]} Wins! \uD83C\uDF89`;
    else wt.textContent = "It's a Tie! \uD83E\uDD1D";

    // Confetti
    const colors = ["#FF4E6A", "#4E9AFF", "#FFD700", "#50E3C2", "#FF6FD8", "#FFA34E"];
    confetti.innerHTML = Array.from({ length: 60 }, (_, i) => {
      const left = Math.random() * 100;
      const delay = Math.random() * 2;
      const duration = 2 + Math.random() * 3;
      const color = colors[i % 6];
      const size = 6 + Math.random() * 8;
      const radius = Math.random() > 0.5 ? "50%" : "2px";
      return `<div class="confetti-piece" style="left:${left}%;width:${size}px;height:${size}px;background:${color};border-radius:${radius};animation:confettiFall ${duration}s ease-in ${delay}s both;"></div>`;
    }).join("");
  }
}

function handleScore(team) {
  const q = CATEGORIES[selectedQ.catIdx].questions[selectedQ.qIdx];
  scores[team] += q.value;
  const key = `${selectedQ.catIdx}-${selectedQ.qIdx}`;
  answeredQuestions.add(key);
  currentTeam = team === 1 ? 2 : 1;
  selectedQ = null;
  checkComplete();
  gameState = answeredQuestions.size === totalQuestions ? "complete" : "board";
  render();
}

function handleNoScore() {
  const key = `${selectedQ.catIdx}-${selectedQ.qIdx}`;
  answeredQuestions.add(key);
  currentTeam = currentTeam === 1 ? 2 : 1;
  selectedQ = null;
  checkComplete();
  gameState = answeredQuestions.size === totalQuestions ? "complete" : "board";
  render();
}

function checkComplete() {
  // handled inline above
}

function handleReset() {
  answeredQuestions = new Set();
  scores = { 1: 0, 2: 0 };
  currentTeam = 1;
  gameState = "board";
  selectedQ = null;
  render();
}

// Event listeners
document.getElementById("reveal-btn").addEventListener("click", () => {
  gameState = "answer";
  render();
});

document.getElementById("question-overlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) {
    gameState = "answer";
    render();
  }
});

document.getElementById("no-one-btn").addEventListener("click", handleNoScore);
document.getElementById("play-again-btn").addEventListener("click", handleReset);

// Initial render
render();
</script>
</body>
</html>
